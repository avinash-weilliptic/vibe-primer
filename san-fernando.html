<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to San Fernando</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      color: #333;
    }
    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #d35400;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
    }
    .tag {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to San Fernando</h1>
    <p>A sun-kissed city rich in history, warmth, and community. Whether you're visiting or staying a while, we're glad to have you here.</p>
    <div class="tag">Sunshine &middot; Heritage &middot; Hospitality</div>
  </div>
</body>
</html>
